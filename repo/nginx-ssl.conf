# Redirect all HTTP to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS server — production profile.
# Requires cert/key volume mounts. See docker-compose.ssl.yml.
#
# Generate a self-signed certificate for local testing:
#   openssl req -x509 -newkey rsa:4096 -keyout harborstone.key \
#     -out harborstone.crt -days 365 -nodes -subj '/CN=localhost'
# For production, use a CA-signed certificate (e.g. Let's Encrypt via certbot).
server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/ssl/certs/harborstone.crt;
    ssl_certificate_key /etc/ssl/private/harborstone.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip static assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Health check passthrough
    location = /healthz {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Proxy all /api requests to the Koa backend
    location /api/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow large file uploads (attachments up to 201 MB)
        client_max_body_size 210m;
        proxy_request_buffering  off;
        proxy_read_timeout       300s;
        proxy_send_timeout       300s;
    }

    # Vue SPA — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
